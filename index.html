<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multi Stream Viewer</title>
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #141418;
    --panel-2: #1c1c22;
    --border: #26262d;
    --border-strong: #36363f;
    --text: #f1f1f3;
    --text-dim: #9a9aa6;
    --text-muted: #6a6a76;
    --accent: #8b5cf6;
    --accent-hover: #7c3aed;
    --youtube: #ff0033;
    --twitch: #9146ff;
    --kick: #53fc18;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif; overflow: hidden; font-size: 14px; }
  button, input, select { font-family: inherit; }

  #app {
    display: grid;
    grid-template-columns: var(--sidebar-w, 240px) 1fr;
    grid-template-rows: 48px 1fr;
    grid-template-areas: "topbar topbar" "sidebar main";
    height: 100vh;
    transition: grid-template-columns 0.18s ease;
  }
  #app.sidebar-collapsed { --sidebar-w: 48px; }

  /* ===== Topbar ===== */
  #topbar {
    grid-area: topbar;
    display: flex; align-items: center; gap: 10px;
    padding: 0 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #topbar .logo {
    display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px;
    letter-spacing: 0.3px; user-select: none;
  }
  #topbar .logo .dot {
    width: 10px; height: 10px; border-radius: 3px;
    background: linear-gradient(135deg, var(--twitch), var(--accent));
  }
  #topbar .spacer { flex: 1; }
  #topbar .hint { font-size: 12px; color: var(--text-muted); }
  .icon-btn {
    background: transparent; border: 1px solid transparent; color: var(--text-dim);
    width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .icon-btn:hover { background: var(--panel-2); color: var(--text); border-color: var(--border); }

  /* ===== Sidebar ===== */
  #sidebar {
    grid-area: sidebar;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar .section {
    padding: 14px 14px 8px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
    color: var(--text-muted); text-transform: uppercase;
  }
  #sidebar .layouts {
    padding: 0 10px 10px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .layout-tile {
    aspect-ratio: 16/10; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; padding: 4px; display: grid; gap: 2px;
    transition: border-color 0.1s, background 0.1s; position: relative;
  }
  .layout-tile:hover { border-color: var(--border-strong); background: #22222a; }
  .layout-tile.active { border-color: var(--accent); background: rgba(139, 92, 246, 0.12); }
  .layout-tile .cell { background: var(--text-muted); border-radius: 2px; opacity: 0.5; }
  .layout-tile.active .cell { background: var(--accent); opacity: 0.85; }
  .layout-tile .lbl {
    position: absolute; bottom: 2px; right: 4px; font-size: 9px; font-weight: 700;
    color: var(--text-muted);
  }
  .layout-tile.active .lbl { color: var(--accent); }

  #sidebar .help {
    margin: auto 0 0; padding: 12px 14px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-muted); line-height: 1.6;
  }
  #sidebar .help code {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px;
    padding: 0 4px; color: var(--text-dim); font-size: 10px;
  }
  #sidebar .footer { padding: 10px 14px; display: flex; gap: 6px; }
  #sidebar .footer button {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #sidebar .footer button:hover { color: var(--text); border-color: var(--border-strong); }

  #app.sidebar-collapsed #sidebar > *:not(.collapsed-only) { display: none; }
  #app.sidebar-collapsed #sidebar .collapsed-only { display: flex; flex-direction: column; align-items: center; padding: 8px 0; }
  #sidebar .collapsed-only { display: none; }

  /* ===== Main grid ===== */
  #main {
    grid-area: main; overflow: hidden; background: var(--bg);
    display: grid; gap: 4px; padding: 4px;
  }

  .cell {
    position: relative; background: #000; border-radius: 6px; overflow: hidden;
    min-height: 0; min-width: 0; border: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .cell.empty { background: var(--panel); border-style: dashed; }

  /* empty cell form */
  .cell-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 16px; text-align: center;
  }
  .cell-empty .num {
    font-size: 12px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cell-empty .row { display: flex; gap: 6px; width: 100%; max-width: 320px; }
  .cell-empty input {
    flex: 1; min-width: 0; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 13px; outline: none;
  }
  .cell-empty input:focus { border-color: var(--accent); }
  .cell-empty .show {
    background: var(--accent); color: #fff; border: 0; border-radius: 6px;
    padding: 8px 14px; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap;
  }
  .cell-empty .show:hover { background: var(--accent-hover); }
  .cell-empty .alt {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 12px; border-radius: 999px; font-size: 12px; cursor: pointer;
  }
  .cell-empty .alt:hover { color: var(--text); border-color: var(--accent); }
  .cell-empty .examples { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
  .cell-empty .examples button {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    padding: 3px 9px; border-radius: 999px; font-size: 11px; cursor: pointer;
  }
  .cell-empty .examples button:hover { color: var(--text); border-color: var(--border-strong); }

  /* player / chat iframe */
  .cell iframe { width: 100%; height: 100%; border: 0; display: block; flex: 1; }

  /* cell header (hover) */
  .cell .header {
    position: absolute; top: 0; left: 0; right: 0; min-height: 32px;
    background: linear-gradient(180deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0) 100%);
    display: flex; align-items: center; padding: 5px 8px; gap: 6px;
    opacity: 0; transition: opacity 0.15s; z-index: 5; flex-wrap: wrap;
  }
  .cell:hover .header, .cell:focus-within .header { opacity: 1; }
  .cell.chat-cell .header { opacity: 1; background: linear-gradient(180deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.55) 100%); position: static; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0;
  }
  .badge.youtube { background: var(--youtube); color: #fff; }
  .badge.twitch { background: var(--twitch); color: #fff; }
  .badge.kick { background: var(--kick); color: #000; }
  .badge.chat { background: var(--accent); color: #fff; }
  .cell .name {
    font-size: 12px; color: var(--text); flex: 1; min-width: 40px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; font-weight: 500;
  }
  .cell .header button {
    background: rgba(255,255,255,0.12); border: 0; color: #fff; cursor: pointer;
    width: 24px; height: 24px; border-radius: 4px; font-size: 12px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .cell .header button:hover { background: rgba(255,255,255,0.25); }
  .cell .header button.remove:hover { background: var(--danger); }
  .cell .header select {
    flex: 1; min-width: 80px; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 5px; padding: 4px 6px; font-size: 12px;
    outline: none; cursor: pointer;
  }
  .cell .header select:focus { border-color: var(--accent); }

  .cell .chat-body {
    flex: 1; position: relative; background: #18181b; min-height: 0;
  }
  .cell .chat-body iframe { position: absolute; inset: 0; height: 100%; }
  .cell .chat-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 12px; padding: 20px; text-align: center; line-height: 1.6;
  }

  /* layout grids */
  .layout-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .layout-2h { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
  .layout-2v { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  .layout-3 { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
  .layout-3 > .cell:first-child { grid-row: span 2; }
  .layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .layout-5 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 2fr 1fr; }
  .layout-5 > .cell:first-child { grid-column: span 2; }
  .layout-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .layout-7 { grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
  .layout-7 > .cell:first-child { grid-row: span 3; }
  .layout-8 { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .layout-9 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  @media (max-width: 760px) {
    #app { grid-template-columns: 0 1fr; }
    #app:not(.sidebar-collapsed) { grid-template-columns: 100vw 0; }
    #app:not(.sidebar-collapsed) #main { display: none; }
    #main { grid-template-columns: 1fr !important; grid-auto-rows: 56vw; grid-template-rows: none !important; overflow-y: auto; }
  }
</style>
</head>
<body>
<div id="app" class="sidebar-collapsed">
  <!-- Topbar -->
  <div id="topbar">
    <button class="icon-btn" id="toggleSidebarBtn" title="サイドバー">☰</button>
    <div class="logo"><span class="dot"></span>Multi Stream Viewer</div>
    <span class="hint">レイアウトを選び、各枠にURLを入力</span>
    <div class="spacer"></div>
    <button class="icon-btn" id="shareBtn" title="URLを共有">🔗</button>
    <button class="icon-btn" id="fullscreenBtn" title="全画面">⛶</button>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="collapsed-only">
      <button class="icon-btn" id="toggleSidebarBtn2" title="開く">☰</button>
    </div>
    <div class="section">レイアウト</div>
    <div class="layouts" id="layouts"></div>
    <div class="footer">
      <button id="clearBtn">🗑️ 全クリア</button>
    </div>
    <div class="help">
      対応: <code>YouTube</code> <code>Twitch</code> <code>Kick</code><br>
      各枠の <b>💬</b> ボタンで、その枠を「他の枠で再生中の配信のチャット表示」に切り替えられます。
    </div>
  </aside>

  <!-- Main grid -->
  <main id="main"></main>
</div>

<script>
// ===== Twitch / YouTube embed parents =====
function getParents() {
  const set = new Set();
  if (location.hostname) set.add(location.hostname);
  try { if (document.referrer) set.add(new URL(document.referrer).hostname); } catch (e) {}
  set.add('localhost'); set.add('127.0.0.1');
  return Array.from(set).filter(Boolean);
}
const PARENTS = getParents();
const TWITCH_PARENTS_QS = PARENTS.map(p => `parent=${encodeURIComponent(p)}`).join('&');
const YT_EMBED_DOMAINS_QS = PARENTS.map(p => `embed_domain=${encodeURIComponent(p)}`).join('&');

// ===== Layouts =====
const LAYOUTS = [
  { id: '1',  n: 1 }, { id: '2h', n: 2 }, { id: '2v', n: 2 },
  { id: '3',  n: 3 }, { id: '4',  n: 4 }, { id: '5',  n: 5 },
  { id: '6',  n: 6 }, { id: '7',  n: 7 }, { id: '8',  n: 8 },
  { id: '9',  n: 9 },
];
function layoutCount(id) { return (LAYOUTS.find(l => l.id === id) || { n: 1 }).n; }

// ===== State =====
// cells: [{ id, mode:'empty'|'video'|'chat', stream:{type,value,kind,name}|null, chatSourceId:id|null }]
const state = { layout: '4', cells: [] };

const app = document.getElementById('app');
const main = document.getElementById('main');
const layoutsEl = document.getElementById('layouts');

function uid() { return Math.random().toString(36).slice(2, 10); }

// ===== Parsing input -> stream =====
function parseInput(raw) {
  const s = (raw || '').trim();
  if (!s) return null;
  let m;
  if ((m = s.match(/^twitch:(.+)$/i))) return { type: 'twitch', value: m[1].trim() };
  if ((m = s.match(/^kick:(.+)$/i)))   return { type: 'kick',   value: m[1].trim() };
  if ((m = s.match(/^(?:youtube|yt):(.+)$/i))) {
    const v = m[1].trim();
    if (/^UC[A-Za-z0-9_-]{10,}$/.test(v)) return { type: 'youtube', value: v, kind: 'channel' };
    if (v.startsWith('@')) return { type: 'youtube', value: v, kind: 'handle' };
    return { type: 'youtube', value: v, kind: 'video' };
  }
  try {
    const url = new URL(s.startsWith('http') ? s : 'https://' + s);
    const host = url.hostname.replace(/^www\./, '');
    if (host === 'twitch.tv' || host.endsWith('.twitch.tv')) {
      const p = url.pathname.split('/').filter(Boolean); if (p.length) return { type: 'twitch', value: p[0] };
    }
    if (host === 'kick.com' || host.endsWith('.kick.com')) {
      const p = url.pathname.split('/').filter(Boolean); if (p.length) return { type: 'kick', value: p[0] };
    }
    if (host === 'youtube.com' || host.endsWith('.youtube.com')) {
      const v = url.searchParams.get('v'); if (v) return { type: 'youtube', value: v, kind: 'video' };
      let mm;
      if ((mm = url.pathname.match(/^\/live\/([^/]+)/)))    return { type: 'youtube', value: mm[1], kind: 'video' };
      if ((mm = url.pathname.match(/^\/embed\/([^/]+)/)))   return { type: 'youtube', value: mm[1], kind: 'video' };
      if ((mm = url.pathname.match(/^\/channel\/([^/]+)/))) return { type: 'youtube', value: mm[1], kind: 'channel' };
      if ((mm = url.pathname.match(/^\/(@[^/]+)/)))         return { type: 'youtube', value: mm[1], kind: 'handle' };
    }
    if (host === 'youtu.be') {
      const id = url.pathname.split('/').filter(Boolean)[0]; if (id) return { type: 'youtube', value: id, kind: 'video' };
    }
  } catch (e) {}
  if (/^[A-Za-z0-9_-]{11}$/.test(s)) return { type: 'youtube', value: s, kind: 'video' };
  if (/^UC[A-Za-z0-9_-]{20,}$/.test(s)) return { type: 'youtube', value: s, kind: 'channel' };
  if (s.startsWith('@')) return { type: 'youtube', value: s, kind: 'handle' };
  return { type: 'twitch', value: s };
}

// ===== Embed URLs =====
function buildPlayerUrl(s) {
  if (s.type === 'twitch') return `https://player.twitch.tv/?channel=${encodeURIComponent(s.value)}&${TWITCH_PARENTS_QS}&muted=true&autoplay=true`;
  if (s.type === 'kick')   return `https://player.kick.com/${encodeURIComponent(s.value)}?muted=true&autoplay=true`;
  if (s.type === 'youtube') {
    const origin = encodeURIComponent(location.origin);
    if ((s.kind || 'video') === 'video')
      return `https://www.youtube-nocookie.com/embed/${encodeURIComponent(s.value)}?autoplay=1&mute=1&playsinline=1&origin=${origin}`;
    return `https://www.youtube-nocookie.com/embed/live_stream?channel=${encodeURIComponent(s.value)}&autoplay=1&mute=1&playsinline=1&origin=${origin}`;
  }
  return '';
}
function buildChatUrl(s) {
  if (!s) return null;
  if (s.type === 'twitch') return `https://www.twitch.tv/embed/${encodeURIComponent(s.value)}/chat?darkpopout&${TWITCH_PARENTS_QS}`;
  if (s.type === 'kick')   return `https://kick.com/${encodeURIComponent(s.value)}/chatroom`;
  if (s.type === 'youtube' && (s.kind || 'video') === 'video')
    return `https://www.youtube.com/live_chat?v=${encodeURIComponent(s.value)}&${YT_EMBED_DOMAINS_QS}`;
  return null;
}
function streamLabel(s) {
  const plat = s.type === 'youtube' ? 'YouTube' : s.type === 'twitch' ? 'Twitch' : 'Kick';
  return `${plat}: ${s.value}`;
}

// ===== Cell management =====
function ensureCells() {
  const need = layoutCount(state.layout);
  while (state.cells.length < need) state.cells.push({ id: uid(), mode: 'empty', stream: null, chatSourceId: null });
  if (state.cells.length > need) state.cells.length = need;
}
function findCell(id) { return state.cells.find(c => c.id === id); }
function videoCells() { return state.cells.filter(c => c.mode === 'video' && c.stream); }

function setLayout(id) { state.layout = id; ensureCells(); render(); save(); renderLayoutTiles(); }
function setVideo(cellId, stream) {
  const c = findCell(cellId); if (!c) return;
  c.mode = 'video'; c.stream = stream; c.chatSourceId = null;
  render(); save();
}
function setEmpty(cellId) {
  const c = findCell(cellId); if (!c) return;
  c.mode = 'empty'; c.stream = null; c.chatSourceId = null;
  // any chat cell pointing here becomes unselected
  state.cells.forEach(x => { if (x.mode === 'chat' && x.chatSourceId === cellId) x.chatSourceId = null; });
  render(); save();
}
function setChatMode(cellId) {
  const c = findCell(cellId); if (!c) return;
  c.mode = 'chat'; c.stream = null;
  const vids = videoCells();
  c.chatSourceId = vids.length ? vids[0].id : null;
  render(); save();
}
function setChatSource(cellId, sourceId) {
  const c = findCell(cellId); if (!c) return;
  c.chatSourceId = sourceId || null;
  render(); save();
}

// ===== Render =====
const nodeCache = new Map(); // cellId -> { node, key }

function cellKey(c) {
  if (c.mode === 'empty') return `${c.id}:empty`;
  if (c.mode === 'video') return `${c.id}:video:${buildPlayerUrl(c.stream)}`;
  if (c.mode === 'chat') {
    const src = c.chatSourceId ? findCell(c.chatSourceId) : null;
    const url = src && src.stream ? buildChatUrl(src.stream) : 'none';
    return `${c.id}:chat:${c.chatSourceId || 'none'}:${url}`;
  }
  return c.id;
}

function render() {
  main.className = `layout-${state.layout}`;
  const order = [];
  for (const c of state.cells) {
    const key = cellKey(c);
    let cached = nodeCache.get(c.id);
    let node;
    if (cached && cached.key === key) {
      node = cached.node;
      if (c.mode === 'chat') updateChatSelect(node, c); // keep dropdown selection fresh
    } else {
      node = buildCellNode(c);
      nodeCache.set(c.id, { node, key });
    }
    order.push(node);
  }
  // remove stale cache entries
  const ids = new Set(state.cells.map(c => c.id));
  for (const id of Array.from(nodeCache.keys())) if (!ids.has(id)) nodeCache.delete(id);
  // reorder DOM
  main.replaceChildren(...order);
}

function buildCellNode(c) {
  const idx = state.cells.indexOf(c);
  const el = document.createElement('div');
  el.className = 'cell';
  el.dataset.id = c.id;

  if (c.mode === 'empty') {
    el.classList.add('empty');
    el.innerHTML = `
      <div class="cell-empty">
        <div class="num">枠 ${idx + 1}</div>
        <div class="row">
          <input type="text" placeholder="URL / チャンネル名" autocomplete="off" spellcheck="false">
          <button class="show">表示</button>
        </div>
        <div class="examples">
          <button data-ex="twitch:shroud">twitch:shroud</button>
          <button data-ex="kick:adin">kick:adin</button>
        </div>
        <button class="alt">💬 チャット枠にする</button>
      </div>`;
    const input = el.querySelector('input');
    const submit = () => { const p = parseInput(input.value); if (p) setVideo(c.id, p); };
    el.querySelector('.show').addEventListener('click', submit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    el.querySelectorAll('[data-ex]').forEach(b => b.addEventListener('click', () => { input.value = b.dataset.ex; submit(); }));
    el.querySelector('.alt').addEventListener('click', () => setChatMode(c.id));
    return el;
  }

  if (c.mode === 'video') {
    const s = c.stream;
    el.innerHTML = `
      <div class="header">
        <span class="badge ${s.type}">${s.type}</span>
        <span class="name"></span>
        <button class="to-chat" title="チャット表示に切替">💬</button>
        <button class="reload" title="再読み込み">↻</button>
        <button class="remove" title="閉じる">×</button>
      </div>
      <iframe allowfullscreen allow="autoplay; fullscreen; picture-in-picture; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
    el.querySelector('.name').textContent = s.value;
    const iframe = el.querySelector('iframe');
    iframe.src = buildPlayerUrl(s);
    el.querySelector('.remove').addEventListener('click', () => setEmpty(c.id));
    el.querySelector('.to-chat').addEventListener('click', () => setChatMode(c.id));
    el.querySelector('.reload').addEventListener('click', () => { const u = iframe.src; iframe.src = ''; setTimeout(() => iframe.src = u, 30); });
    return el;
  }

  if (c.mode === 'chat') {
    el.classList.add('chat-cell');
    el.innerHTML = `
      <div class="header">
        <span class="badge chat">chat</span>
        <select class="src"></select>
        <button class="remove" title="閉じる">×</button>
      </div>
      <div class="chat-body"></div>`;
    el.querySelector('.remove').addEventListener('click', () => setEmpty(c.id));
    const sel = el.querySelector('.src');
    sel.addEventListener('change', () => setChatSource(c.id, sel.value));
    fillChatSelect(sel, c);
    renderChatBody(el.querySelector('.chat-body'), c);
    return el;
  }

  return el;
}

function fillChatSelect(sel, c) {
  const vids = videoCells();
  sel.innerHTML = '';
  const def = document.createElement('option');
  def.value = ''; def.textContent = vids.length ? '— 配信を選択 —' : '— 再生中の配信なし —';
  sel.appendChild(def);
  for (const v of vids) {
    const idx = state.cells.indexOf(v);
    const o = document.createElement('option');
    o.value = v.id;
    o.textContent = `枠${idx + 1}: ${streamLabel(v.stream)}`;
    sel.appendChild(o);
  }
  sel.value = c.chatSourceId && vids.some(v => v.id === c.chatSourceId) ? c.chatSourceId : '';
}
function updateChatSelect(node, c) {
  const sel = node.querySelector('select.src');
  if (sel) fillChatSelect(sel, c);
}
function renderChatBody(body, c) {
  const src = c.chatSourceId ? findCell(c.chatSourceId) : null;
  const url = src && src.stream ? buildChatUrl(src.stream) : null;
  if (!c.chatSourceId) {
    body.innerHTML = `<div class="chat-empty">上のメニューから、チャットを表示する配信を選択してください</div>`;
  } else if (!url) {
    body.innerHTML = `<div class="chat-empty">この配信のチャットは埋め込めません<br>（YouTubeはチャンネルURLでなく <code>watch?v=</code> 形式が必要です）</div>`;
  } else {
    const iframe = document.createElement('iframe');
    iframe.src = url; iframe.allow = 'autoplay';
    iframe.referrerPolicy = 'strict-origin-when-cross-origin';
    body.innerHTML = '';
    body.appendChild(iframe);
  }
}

// ===== Layout tiles =====
function renderLayoutTiles() {
  layoutsEl.innerHTML = '';
  for (const l of LAYOUTS) {
    const tile = document.createElement('button');
    tile.className = 'layout-tile' + (state.layout === l.id ? ' active' : '');
    const lbl = document.createElement('span'); lbl.className = 'lbl';
    lbl.textContent = l.id === '2h' ? '2' : l.id === '2v' ? '2' : l.n;
    const mk = () => { const d = document.createElement('div'); d.className = 'cell'; return d; };
    if (l.id === '2h') { tile.style.gridTemplateColumns = '1fr 1fr'; tile.append(mk(), mk()); }
    else if (l.id === '2v') { tile.style.gridTemplateRows = '1fr 1fr'; tile.append(mk(), mk()); }
    else if (l.id === '3') { tile.style.gridTemplateColumns = '2fr 1fr'; tile.style.gridTemplateRows = '1fr 1fr'; const b = mk(); b.style.gridRow = 'span 2'; tile.append(b, mk(), mk()); }
    else if (l.id === '5') { tile.style.gridTemplateColumns = '1fr 1fr 1fr'; tile.style.gridTemplateRows = '2fr 1fr'; const b = mk(); b.style.gridColumn = 'span 2'; tile.append(b); for (let i=0;i<4;i++) tile.append(mk()); }
    else if (l.id === '7') { tile.style.gridTemplateColumns = '2fr 1fr 1fr'; tile.style.gridTemplateRows = '1fr 1fr 1fr'; const b = mk(); b.style.gridRow = 'span 3'; tile.append(b); for (let i=0;i<6;i++) tile.append(mk()); }
    else {
      const cols = l.n === 1 ? 1 : l.n === 4 ? 2 : l.n <= 6 ? 3 : l.n === 8 ? 4 : 3;
      const rows = Math.ceil(l.n / cols);
      tile.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      tile.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      for (let i=0;i<l.n;i++) tile.append(mk());
    }
    tile.appendChild(lbl);
    tile.addEventListener('click', () => setLayout(l.id));
    layoutsEl.appendChild(tile);
  }
}

// ===== Persistence =====
function save() {
  try {
    localStorage.setItem('msv3_state', JSON.stringify({
      layout: state.layout,
      cells: state.cells.map(c => ({
        mode: c.mode,
        stream: c.stream,
        chatSourceIdx: c.chatSourceId ? state.cells.findIndex(x => x.id === c.chatSourceId) : -1,
      })),
    }));
  } catch (e) {}
}
function load() {
  const hash = location.hash.replace(/^#/, '');
  if (hash) { try { hydrate(JSON.parse(decodeURIComponent(atob(hash)))); return; } catch (e) {} }
  try { const raw = localStorage.getItem('msv3_state'); if (raw) hydrate(JSON.parse(raw)); } catch (e) {}
}
function hydrate(data) {
  if (data.layout) state.layout = data.layout;
  if (Array.isArray(data.cells)) {
    state.cells = data.cells.map(c => ({
      id: uid(),
      mode: c.mode || 'empty',
      stream: c.stream || null,
      _chatSourceIdx: typeof c.chatSourceIdx === 'number' ? c.chatSourceIdx : -1,
      chatSourceId: null,
    }));
    state.cells.forEach(c => { if (c._chatSourceIdx >= 0 && state.cells[c._chatSourceIdx]) c.chatSourceId = state.cells[c._chatSourceIdx].id; delete c._chatSourceIdx; });
  }
  ensureCells();
}

// ===== Topbar buttons =====
document.getElementById('toggleSidebarBtn').addEventListener('click', () => app.classList.toggle('sidebar-collapsed'));
document.getElementById('toggleSidebarBtn2').addEventListener('click', () => app.classList.toggle('sidebar-collapsed'));
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('全ての枠をクリアしますか？')) return;
  state.cells.forEach(c => { c.mode = 'empty'; c.stream = null; c.chatSourceId = null; });
  nodeCache.clear(); render(); save();
});
document.getElementById('shareBtn').addEventListener('click', () => {
  const data = { layout: state.layout, cells: state.cells.map(c => ({ mode: c.mode, stream: c.stream, chatSourceIdx: c.chatSourceId ? state.cells.findIndex(x => x.id === c.chatSourceId) : -1 })) };
  const url = `${location.origin}${location.pathname}#${btoa(encodeURIComponent(JSON.stringify(data)))}`;
  navigator.clipboard.writeText(url).then(() => {
    const b = document.getElementById('shareBtn'); const o = b.textContent; b.textContent = '✓';
    setTimeout(() => b.textContent = o, 1200);
  }).catch(() => prompt('共有URL:', url));
});
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen();
});

// ===== Init =====
load();
ensureCells();
renderLayoutTiles();
render();
</script>
</body>
